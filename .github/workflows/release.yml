name: Release
permissions:
  contents: write
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Build platform"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - macos-arm64
          - macos-intel
          - windows-x64

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
            label: macos-arm64
            suffix: macOS-AppleSilicon
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
            label: macos-intel
            suffix: macOS-Intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis
            label: windows-x64
            suffix: Windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust targets
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        if: |
          github.event_name != 'workflow_dispatch' ||
          inputs.platform == 'all' ||
          inputs.platform == matrix.label
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "SubEditor ${{ github.ref_name }}"
          releaseBody: "See the assets below to download this version."
          releaseDraft: true
          includeUpdaterJson: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

      - name: Rename artifacts with platform suffix (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/dmg
          for f in *.dmg; do
            base="${f%.dmg}"
            mv "$f" "${base}_${{ matrix.suffix }}.dmg"
          done

      - name: Rename artifacts with platform suffix (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/nsis
          Get-ChildItem *.exe | ForEach-Object {
            $base = $_.BaseName
            Rename-Item $_ "${base}_${{ matrix.suffix }}.exe"
          }

      - name: Upload artifact (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: SubEditor-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/
